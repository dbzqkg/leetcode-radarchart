services:
  backend:
    build: ./radar-server
    expose:
      - "11451"
    volumes:
      - ../Sources:/app/Sources
    environment:
      app.sources.path: /app/Sources
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "11451:11451"
    volumes:
      - ../Sources/imgs:/usr/share/nginx/html/imgs
    depends_on:
      - backend
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token eyJhIjoiOGJhMzE3ODNmYmM0N2UzMGQ2OTJiZGE4MTRkMTc4ZGQiLCJ0IjoiOWFiMjNjNmUtYmYxNC00MGUxLTg1NTktYjc2YTRlNjFhNDFiIiwicyI6Ik1UUXhNamxrTWpBdE4yWXdOUzAwWmpGa0xUaGpOalF0TUROa01HWm1PRE16WXpOaSJ9
    depends_on:
      - frontend
    restart: unless-stopped
